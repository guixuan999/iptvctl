<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV 控制器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: #fff;
            padding: 10px;
            padding-top: 5px;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 4px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #888;
            margin-bottom: 15px;
            font-size: 0.8rem;
        }
        .hostname {
            color: #666;
            font-size: 0.75rem;
            margin-left: 5px;
        }
        .main-status {
            margin-bottom: 15px;
        }
        .status-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .status-card.on {
            border-color: rgba(0, 184, 148, 0.3);
            background: rgba(0, 184, 148, 0.05);
        }
        .status-card.off {
            border-color: rgba(225, 112, 85, 0.3);
            background: rgba(225, 112, 85, 0.05);
        }
        .status-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }
        .status-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .status-card.on .status-text {
            color: #00b894;
        }
        .status-card.off .status-text {
            color: #e17055;
        }
        .timer-info {
            font-size: 0.75rem;
            color: #888;
            margin-top: 6px;
            padding: 4px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: inline-block;
        }
        .main-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn {
            padding: 10px 8px;
            font-size: 0.9rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-weight: 600;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-on {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            box-shadow: 0 8px 20px rgba(0, 184, 148, 0.3);
        }
        .btn-off {
            background: linear-gradient(135deg, #e17055, #d63031);
            color: white;
            box-shadow: 0 8px 20px rgba(225, 112, 85, 0.3);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-icon {
            font-size: 1.2rem;
        }
        .timer-section {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 12px 0;
            margin-bottom: 12px;
        }
        .timer-section .timer-title {
            padding: 0 12px;
        }
        .timer-title {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .timer-buttons {
            display: flex;
            gap: 10px;
        }
        .btn-timer {
            flex: 1;
            padding: 14px 6px;
            font-size: 0.9rem;
            border: 2px solid rgba(0, 184, 148, 0.3);
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(0, 184, 148, 0.1), rgba(0, 184, 148, 0.05));
            color: #00b894;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            line-height: 1.3;
        }
        .btn-timer:active {
            background: linear-gradient(135deg, rgba(0, 184, 148, 0.2), rgba(0, 184, 148, 0.1));
            transform: scale(0.95);
        }
        .btn-timer.active {
            background: linear-gradient(135deg, #00b894, #00a085);
            border-color: transparent;
            color: #fff;
        }
        .btn-cancel {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: transparent;
            color: #888;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-cancel:active {
            background: rgba(255,255,255,0.05);
        }
        .detail-btn {
            padding: 10px 20px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #888;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 10px;
        }
        .detail-btn:active {
            background: rgba(255,255,255,0.1);
        }
        .schedule-btn {
            padding: 10px 20px;
            font-size: 0.85rem;
            border: 1px solid rgba(0, 184, 148, 0.3);
            border-radius: 8px;
            background: rgba(0, 184, 148, 0.1);
            color: #00b894;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 10px;
        }
        .schedule-btn:active {
            background: rgba(0, 184, 148, 0.2);
        }
        .next-schedules {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: #888;
        }
        .next-schedules-title {
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 8px;
            text-align: center;
        }
        .next-schedule-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .next-schedule-item:last-child {
            border-bottom: none;
        }
        .next-schedule-label {
            color: #888;
        }
        .next-schedule-time {
            font-size: 1rem;
            font-weight: 600;
        }
        .next-schedule-time.on {
            color: #00b894;
        }
        .next-schedule-time.off {
            color: #e17055;
        }
        .result-panel {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 10px;
            margin-top: 12px;
            font-size: 0.8rem;
            color: #888;
            min-height: 40px;
            display: none;
        }
        .result-panel.show {
            display: block;
        }
        .result-panel.success {
            color: #51cf66;
            background: rgba(81, 207, 102, 0.05);
        }
        .result-panel.error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.05);
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .log-btn {
            padding: 12px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(116, 185, 255, 0.1);
            color: #74b9ff;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 10px;
        }
        .log-btn:active {
            background: rgba(116, 185, 255, 0.2);
        }
        .log-btn-small {
            padding: 8px;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            background: rgba(116, 185, 255, 0.08);
            color: #74b9ff;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 8px;
        }
        .log-btn-small:active {
            background: rgba(116, 185, 255, 0.15);
        }
        .log-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .log-modal-content {
            background: #1a1d29;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            overflow: hidden;
        }
        .log-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .log-modal-header h3 {
            margin: 0;
            font-size: 1rem;
            color: #fff;
        }
        .log-close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .log-modal-body {
            padding: 15px;
            overflow-y: auto;
            max-height: 50vh;
        }
        .log-list {
            font-size: 0.85rem;
            line-height: 1.8;
        }
        .log-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #aaa;
        }
        .log-item:last-child {
            border-bottom: none;
        }
        .log-empty {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        .log-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .log-table th {
            background: rgba(255,255,255,0.05);
            padding: 10px 8px;
            text-align: left;
            color: #888;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .log-table td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #aaa;
        }
        .log-table tr:last-child td {
            border-bottom: none;
        }
        .log-table tr:hover {
            background: rgba(255,255,255,0.02);
        }
        .log-table .col-num {
            width: 60px;
            color: #666;
            text-align: center;
        }
        .log-table .col-time {
            width: 45%;
        }
        .log-table .col-action {
            color: #74b9ff;
        }
        .log-table .col-action.ongoing {
            color: #00b894;
            font-weight: bold;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 15px 0 5px;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 10px;
        }
        .pagination button {
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: #aaa;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .pagination button:hover:not(:disabled) {
            background: rgba(255,255,255,0.1);
        }
        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .pagination .page-info {
            color: #888;
            font-size: 0.8rem;
            padding: 0 10px;
        }
        .log-filter {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }
        .log-filter label {
            color: #888;
        }
        .log-filter input[type="date"] {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 6px 10px;
            color: #aaa;
            font-size: 0.85rem;
        }
        .log-filter button {
            background: rgba(116, 185, 255, 0.1);
            border: 1px solid rgba(116, 185, 255, 0.2);
            border-radius: 4px;
            padding: 6px 12px;
            color: #74b9ff;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .log-filter button:hover {
            background: rgba(116, 185, 255, 0.2);
        }
        .log-stats {
            background: rgba(0, 184, 148, 0.1);
            border-radius: 6px;
            padding: 10px 15px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 0.9rem;
            color: #00b894;
        }
        .log-stats.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 IPTV 控制器</h1>
        <p class="subtitle">家庭电视远程控制 <span id="hostname" class="hostname"></span></p>
        
        <div class="main-status">
            <div class="status-card unknown" id="statusCard">
                <div class="status-icon" id="statusIcon">⏳</div>
                <div class="status-text" id="statusText">检测中...</div>
                <div class="timer-info" id="timerInfo" style="display: none;"></div>
            </div>
        </div>
        
        <div class="main-controls">
            <button class="btn btn-on" onclick="controlIptv('on')">
                <span class="btn-icon">▶️</span>
                <span>开启</span>
            </button>
            <button class="btn btn-off" onclick="controlIptv('off')">
                <span class="btn-icon">⏹️</span>
                <span>关闭</span>
            </button>
        </div>
        
        <div class="timer-section">
            <div class="timer-title">⏰ 开启后定时关闭</div>
            <div class="timer-buttons">
                <button class="btn-timer" data-min="10" onclick="setTimer(10)">开启<br>10分钟</button>
                <button class="btn-timer" data-min="20" onclick="setTimer(20)">开启<br>20分钟</button>
                <button class="btn-timer" data-min="30" onclick="setTimer(30)">开启<br>30分钟</button>
            </div>
            <button class="btn-cancel" id="cancelBtn" onclick="cancelTimer()" style="display: none;">取消定时</button>
            <button class="log-btn-small" onclick="showLogs()">📝 观看记录</button>
        </div>
        
        <div class="next-schedules" id="nextSchedules" style="display: none;">
            <div class="next-schedules-title">📅 下次计划操作</div>
            <div id="nextSchedulesList"></div>
        </div>
        
        <button class="schedule-btn" onclick="goToSchedule()">📅 计划管理</button>
        <button class="detail-btn" onclick="showDetail()">📊 查看详情</button>
        
        <div class="result-panel" id="resultPanel"></div>
    </div>
    
    <!-- 日志弹窗 -->
    <div class="log-modal" id="logModal" style="display: none;">
        <div class="log-modal-content">
            <div class="log-modal-header">
                <h3>📝 定时开启日志</h3>
                <button class="log-close-btn" onclick="closeLogs()">✕</button>
            </div>
            <div class="log-modal-body">
                <div class="log-filter">
                    <label>选择日期：</label>
                    <input type="date" id="logDateFilter" onchange="filterLogsByDate()">
                    <button onclick="clearDateFilter()">显示全部</button>
                </div>
                <div class="log-stats" id="logStats"></div>
                <table class="log-table" id="logTable">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>开始时间</th>
                            <th>结束时间</th>
                            <th>时长</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody"></tbody>
                </table>
                <div class="log-empty" id="logEmpty" style="display: none;">暂无日志记录</div>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <script>
        let currentTimerMinutes = null;
        
        // 页面加载时获取当前状态
        async function loadCurrentStatus() {
            try {
                const response = await fetch('/api/iptv/status/current');
                const data = await response.json();
                updateStatusDisplay(data.status);
                updateTimerDisplay(data.timer_remaining);
                updateNextSchedules(data.next_schedules, data.skip_crontab);
                updateHostname(data.hostname);
            } catch (error) {
                updateStatusDisplay('unknown');
            }
        }
        
        // 更新主机名显示
        function updateHostname(hostname) {
            const el = document.getElementById('hostname');
            if (el && hostname) {
                el.textContent = `@${hostname}`;
            }
        }
        
        // 格式化下次计划时间显示
        function formatNextTime(schedule) {
            if (!schedule || !schedule.time) return '--:--';

            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            // 解析 schedule 日期
            const [year, month, day] = schedule.date.split('-').map(Number);
            const scheduleDate = new Date(year, month - 1, day);

            // 计算天数差
            const diffDays = Math.round((scheduleDate - today) / (1000 * 60 * 60 * 24));

            if (diffDays === 0) {
                // 今天，只显示时间
                return schedule.time;
            } else if (diffDays === 1) {
                // 明天
                return `明天 ${schedule.time}`;
            } else {
                // 其他日期，显示月日
                return `${month}月${day}日 ${schedule.time}`;
            }
        }

        // 更新下次计划操作显示（后端已按时间排序）
        function updateNextSchedules(nextSchedules, skipCrontab) {
            const container = document.getElementById('nextSchedules');
            const listEl = document.getElementById('nextSchedulesList');

            const schedules = nextSchedules || [];

            if (schedules.length === 0) {
                container.style.display = 'none';
                return;
            }

            // 渲染列表（后端已排序）
            listEl.innerHTML = schedules.map(s => {
                // 如果被跳过，添加提示
                const isSkipped = s.action === 'off' && skipCrontab;
                const skipHint = isSkipped ? ' (跳过)' : '';
                return `
                    <div class="next-schedule-item">
                        <span class="next-schedule-label">${s.label}:</span>
                        <span class="next-schedule-time ${s.action}" ${isSkipped ? 'style="opacity:0.5;text-decoration:line-through;"' : ''}>
                            ${formatNextTime(s)}${skipHint}
                        </span>
                    </div>
                `;
            }).join('');

            container.style.display = 'block';
        }
        
        function goToSchedule() {
            window.location.href = '/schedule';
        }
        
        // 日志分页状态
        let logData = [];
        let filteredLogData = [];
        let currentPage = 1;
        const ITEMS_PER_PAGE = 5;
        
        // 解析日志条目
        function parseLogEntry(log) {
            // 格式: "2025-02-26 13:50:00 - START" 或 "2025-02-26 13:50:00 - STOP"
            const match = log.match(/^(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2}:\d{2}) - (START|STOP)$/);
            if (match) {
                return { date: match[1], time: match[2], action: match[3] };
            }
            return null;
        }
        
        // 将日志配对成观看记录
        function pairLogs(logs) {
            const pairs = [];
            let currentStart = null;
            
            for (const log of logs) {
                const parsed = parseLogEntry(log);
                if (!parsed) continue;
                
                if (parsed.action === 'START') {
                    currentStart = parsed;
                } else if (parsed.action === 'STOP' && currentStart) {
                    pairs.push({
                        startDate: currentStart.date,
                        startTime: currentStart.time,
                        stopDate: parsed.date,
                        stopTime: parsed.time,
                        duration: calculateDuration(currentStart, parsed)
                    });
                    currentStart = null;
                }
            }
            
            // 如果有未配对的 START，说明还在观看中
            if (currentStart) {
                const now = new Date();
                const nowStr = {
                    date: now.toISOString().split('T')[0],
                    time: now.toTimeString().slice(0, 8)
                };
                pairs.push({
                    startDate: currentStart.date,
                    startTime: currentStart.time,
                    stopDate: nowStr.date,
                    stopTime: nowStr.time,
                    duration: calculateDuration(currentStart, nowStr),
                    ongoing: true
                });
            }
            
            return pairs.reverse(); // 最新的在前面
        }
        
        // 计算观看时长（分钟）
        function calculateDuration(start, stop) {
            const startDt = new Date(`${start.date}T${start.time}`);
            const stopDt = new Date(`${stop.date}T${stop.time}`);
            const diffMs = stopDt - startDt;
            return Math.round(diffMs / 1000 / 60);
        }
        
        // 格式化日期显示（今天/昨天/原样）
        function formatLogDate(dateStr) {
            if (!dateStr) return '';
            
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            
            const [year, month, day] = dateStr.split('-').map(Number);
            const logDate = new Date(year, month - 1, day);
            
            const diffDays = Math.round((today - logDate) / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) {
                return '今天';
            } else if (diffDays === 1) {
                return '昨天';
            } else {
                return dateStr;
            }
        }
        
        // 筛选日志
        function filterLogsByDate() {
            const dateFilter = document.getElementById('logDateFilter').value;
            if (!dateFilter) {
                clearDateFilter();
                return;
            }
            
            // 筛选数据（根据开始日期）
            filteredLogData = logData.filter(log => {
                return log.date === dateFilter;
            });
            
            currentPage = 1;
            
            // 计算并显示统计
            const totalMinutes = filteredLogData.reduce((sum, log) => sum + log.duration, 0);
            const statsDiv = document.getElementById('logStats');
            statsDiv.textContent = `${dateFilter} 共观看 ${totalMinutes} 分钟`;
            statsDiv.classList.remove('hidden');
            
            renderFilteredLogTable();
        }
        
        // 清除日期筛选
        function clearDateFilter() {
            document.getElementById('logDateFilter').value = '';
            filteredLogData = [];
            currentPage = 1;
            document.getElementById('logStats').classList.add('hidden');
            renderLogTable();
        }
        
        // 渲染筛选后的日志表格
        function renderFilteredLogTable() {
            const table = document.getElementById('logTable');
            const tbody = document.getElementById('logTableBody');
            const emptyDiv = document.getElementById('logEmpty');
            const pagination = document.getElementById('pagination');
            
            if (filteredLogData.length === 0) {
                table.style.display = 'none';
                emptyDiv.style.display = 'block';
                emptyDiv.textContent = '该日期暂无日志记录';
                pagination.style.display = 'none';
                return;
            }
            
            table.style.display = 'table';
            emptyDiv.style.display = 'none';
            pagination.style.display = 'flex';
            
            // 计算分页
            const totalPages = Math.ceil(filteredLogData.length / ITEMS_PER_PAGE);
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const pageData = filteredLogData.slice(start, end);
            
            // 渲染表格行
            tbody.innerHTML = pageData.map((log) => {
                const dateDisplay = formatLogDate(log.date);
                const durationClass = log.ongoing ? 'ongoing' : '';
                return `
                    <tr>
                        <td class="col-num">${log.index}</td>
                        <td class="col-time">${dateDisplay} ${log.startTime}</td>
                        <td class="col-time">${log.stopTime}</td>
                        <td class="col-action ${durationClass}">${log.duration} 分钟</td>
                    </tr>
                `;
            }).join('');
            
            // 渲染分页控件
            renderFilteredPagination(totalPages);
        }
        
        // 渲染筛选后的分页控件
        function renderFilteredPagination(totalPages) {
            const pagination = document.getElementById('pagination');
            
            let html = '';
            
            // 上一页按钮
            html += `<button onclick="changeFilteredPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            
            // 页码信息
            html += `<span class="page-info">${currentPage} / ${totalPages}</span>`;
            
            // 下一页按钮
            html += `<button onclick="changeFilteredPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
            
            pagination.innerHTML = html;
        }
        
        // 切换筛选后的页面
        function changeFilteredPage(page) {
            const totalPages = Math.ceil(filteredLogData.length / ITEMS_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderFilteredLogTable();
        }
        
        // 渲染日志表格（全部数据）
        function renderLogTable() {
            const table = document.getElementById('logTable');
            const tbody = document.getElementById('logTableBody');
            const emptyDiv = document.getElementById('logEmpty');
            const pagination = document.getElementById('pagination');
            
            if (logData.length === 0) {
                table.style.display = 'none';
                emptyDiv.style.display = 'block';
                emptyDiv.textContent = '暂无日志记录';
                pagination.style.display = 'none';
                return;
            }
            
            table.style.display = 'table';
            emptyDiv.style.display = 'none';
            pagination.style.display = 'flex';
            
            // 计算分页
            const totalPages = Math.ceil(logData.length / ITEMS_PER_PAGE);
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const pageData = logData.slice(start, end);
            
            // 渲染表格行
            tbody.innerHTML = pageData.map((log) => {
                const dateDisplay = formatLogDate(log.date);
                const durationClass = log.ongoing ? 'ongoing' : '';
                return `
                    <tr>
                        <td class="col-num">${log.index}</td>
                        <td class="col-time">${dateDisplay} ${log.startTime}</td>
                        <td class="col-time">${log.stopTime}</td>
                        <td class="col-action ${durationClass}">${log.duration} 分钟</td>
                    </tr>
                `;
            }).join('');
            
            // 渲染分页控件
            renderPagination(totalPages);
        }
        
        // 渲染分页控件
        function renderPagination(totalPages) {
            const pagination = document.getElementById('pagination');
            
            let html = '';
            
            // 上一页按钮
            html += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
            
            // 页码信息
            html += `<span class="page-info">${currentPage} / ${totalPages}</span>`;
            
            // 下一页按钮
            html += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
            
            pagination.innerHTML = html;
        }
        
        // 切换页面
        function changePage(page) {
            const totalPages = Math.ceil(logData.length / ITEMS_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderLogTable();
        }
        
        // 显示日志弹窗
        async function showLogs() {
            const modal = document.getElementById('logModal');
            const tbody = document.getElementById('logTableBody');
            
            modal.style.display = 'flex';
            tbody.innerHTML = '<tr><td colspan="4" class="log-empty">加载中...</td></tr>';
            
            try {
                const response = await fetch('/api/iptv/logs');
                const data = await response.json();
                
                if (data.logs && data.logs.length > 0) {
                    // 将原始日志配对成观看记录
                    const pairedLogs = pairLogs(data.logs);
                    // 转换为显示格式
                    logData = pairedLogs.map((p, idx) => ({
                        index: pairedLogs.length - idx,
                        date: p.startDate,
                        startTime: p.startTime,
                        stopTime: p.ongoing ? p.stopTime + ' (观看中)' : p.stopTime,
                        duration: p.duration,
                        ongoing: p.ongoing
                    }));
                    currentPage = 1;
                    renderLogTable();
                } else {
                    logData = [];
                    renderLogTable();
                }
            } catch (error) {
                logData = [];
                document.getElementById('logTable').style.display = 'none';
                document.getElementById('logEmpty').style.display = 'block';
                document.getElementById('logEmpty').textContent = '加载失败';
                document.getElementById('pagination').style.display = 'none';
            }
        }
        
        // 关闭日志弹窗
        function closeLogs() {
            document.getElementById('logModal').style.display = 'none';
        }
        
        // 更新状态显示
        function updateStatusDisplay(status) {
            const card = document.getElementById('statusCard');
            const icon = document.getElementById('statusIcon');
            const text = document.getElementById('statusText');
            
            card.className = 'status-card ' + status;
            
            if (status === 'on') {
                icon.textContent = '📺';
                text.textContent = 'IPTV 已开启';
            } else if (status === 'off') {
                icon.textContent = '📴';
                text.textContent = 'IPTV 已关闭';
            } else {
                icon.textContent = '❓';
                text.textContent = '状态未知';
            }
        }
        
        // 更新定时器显示
        function updateTimerDisplay(remainingSeconds) {
            const timerInfo = document.getElementById('timerInfo');
            const cancelBtn = document.getElementById('cancelBtn');
            const timerBtns = document.querySelectorAll('.btn-timer');
            
            if (remainingSeconds && remainingSeconds > 0) {
                const minutes = Math.floor(remainingSeconds / 60);
                const seconds = remainingSeconds % 60;
                timerInfo.textContent = `⏱️ ${minutes}分${seconds}秒后关闭`;
                timerInfo.style.display = 'inline-block';
                cancelBtn.style.display = 'inline-block';
                timerBtns.forEach(btn => btn.classList.remove('active'));
            } else {
                timerInfo.style.display = 'none';
                cancelBtn.style.display = 'none';
                timerBtns.forEach(btn => btn.classList.remove('active'));
                currentTimerMinutes = null;
            }
        }
        
        // 格式化剩余时间
        function formatRemainingTime(totalSeconds) {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes}分${seconds < 10 ? '0' : ''}${seconds}秒`;
        }
        
        async function controlIptv(action) {
            const resultPanel = document.getElementById('resultPanel');
            const buttons = document.querySelectorAll('.btn');
            
            buttons.forEach(btn => btn.disabled = true);
            resultPanel.className = 'result-panel show';
            resultPanel.innerHTML = '<span class="spinner"></span> 执行中...';
            
            try {
                const response = await fetch(`/api/iptv/${action}`);
                const data = await response.json();
                
                if (data.success) {
                    resultPanel.className = 'result-panel show success';
                    resultPanel.textContent = action === 'status' ? data.stdout : '执行成功';
                    
                    if (action === 'on') {
                        updateStatusDisplay('on');
                    } else if (action === 'off') {
                        updateStatusDisplay('off');
                    } else if (action === 'status' && data.iptv_state) {
                        updateStatusDisplay(data.iptv_state);
                    }
                } else {
                    resultPanel.className = 'result-panel show error';
                    resultPanel.textContent = data.stderr || data.error || '执行失败';
                }
            } catch (error) {
                resultPanel.className = 'result-panel show error';
                resultPanel.textContent = '网络错误: ' + error.message;
            } finally {
                buttons.forEach(btn => btn.disabled = false);
            }
        }
        
        async function setTimer(minutes) {
            const resultPanel = document.getElementById('resultPanel');
            const timerBtns = document.querySelectorAll('.btn-timer');
            
            timerBtns.forEach(btn => btn.disabled = true);
            resultPanel.className = 'result-panel show';
            resultPanel.innerHTML = '<span class="spinner"></span> 设置中...';
            
            try {
                const response = await fetch(`/api/iptv/timer/${minutes}`);
                const data = await response.json();
                
                if (data.success) {
                    resultPanel.className = 'result-panel show success';
                    resultPanel.textContent = data.message;
                    currentTimerMinutes = minutes;
                    updateTimerDisplay(minutes * 60);
                    
                    // 高亮选中的按钮
                    timerBtns.forEach(btn => {
                        btn.classList.remove('active');
                        if (parseInt(btn.dataset.min) === minutes) {
                            btn.classList.add('active');
                        }
                    });
                } else {
                    resultPanel.className = 'result-panel show error';
                    resultPanel.textContent = data.error || '设置失败';
                }
            } catch (error) {
                resultPanel.className = 'result-panel show error';
                resultPanel.textContent = '网络错误: ' + error.message;
            } finally {
                timerBtns.forEach(btn => btn.disabled = false);
            }
        }
        
        async function cancelTimer() {
            const resultPanel = document.getElementById('resultPanel');
            const cancelBtn = document.getElementById('cancelBtn');
            
            cancelBtn.disabled = true;
            
            try {
                const response = await fetch('/api/iptv/timer/cancel');
                const data = await response.json();
                
                if (data.success) {
                    resultPanel.className = 'result-panel show success';
                    resultPanel.textContent = data.message;
                    updateTimerDisplay(0);
                } else {
                    resultPanel.className = 'result-panel show';
                    resultPanel.textContent = data.message;
                }
            } catch (error) {
                resultPanel.className = 'result-panel show error';
                resultPanel.textContent = '网络错误: ' + error.message;
            } finally {
                cancelBtn.disabled = false;
            }
        }
        
        async function showDetail() {
            await controlIptv('status');
        }
        
        // 页面加载时获取状态
        loadCurrentStatus();
        // 每 1 秒自动刷新状态
        setInterval(loadCurrentStatus, 1000);
    </script>
</body>
</html>
